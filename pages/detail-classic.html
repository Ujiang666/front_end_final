            '首先，从文学改编到电影剧作，如果我们要把作为艺术的电影摆在跟文学不相上下的地位上，把伍尔夫的大部分小说改编成电影看起来就不是什么好主意，这一部电影同样也不能例外。所以，这里我的结论是：这部电影远远没有完成小说的任务，我只能说它的成功之处在于把玩风格，并且迷惑到了大家（特别是在开场的几个极其唯美的镜头，让我也对这部电影充满期待），但是借助风格所要表达的内涵相比与小说的确大打折扣。胡子老师在他那门搞怪的"电影中的世界文学"第一堂课上提到过一种关于小说和电影职能转换的通俗理论：因为电影这门被争论的"艺术"的兴起，传统的古典小说的叙事职能可以说轻而易举的被电影替代。而二十世纪的小说需要另寻出路，摆脱传统的经典叙事模式并把叙事职能转交给了电影这门艺术。依照这样的观点来看，伍尔夫绝大部分小说并不属于传统的经典叙事，而是为大家熟知的"意识流"笔法，在叙事技巧上也远远超出了当时的常规。所以，伍尔夫的小说本身就是叙事学研究的丰富文本，这本身给电影改编带来了巨大的难度，也就是说，这样的文学作品实际上是不适合，或者说不大容易改编成电影作品的。';

            '<a href="detail-classic.html?id=' + nextId + '" class="pagination-btn next">' +
            '<span class="pagination-label">Next →</span>' +
            '<span class="pagination-title">' + movies[nextId].title + "</span></a>";

          return;
        }

      })();
    </script>
  </body>
